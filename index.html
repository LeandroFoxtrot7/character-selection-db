<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Ball - Character Selection</title>

    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body>
    <main class="character-select">
        <!-- Characters list -->
        <section class="character-list">
            <ul class="characters">
                <li class="character">
                    <button data-name="Goku">
                        <img src="/images/goku.png" alt="Goku">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Vegeta">
                        <img src="/images/vegeta.png" alt="Vegeta">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Gohan">
                        <img src="/images/gohan.png" alt="Gohan">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Piccolo">
                        <img src="/images/piccolo.png" alt="Piccolo">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Tenshinhan">
                        <img src="/images/tenshinhan.png" alt="Tenshinhan">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Yamcha">
                        <img src="/images/yamcha.png" alt="yamcha">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Trunks">
                        <img src="/images/trunks.jpg" alt="trunks">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Mr_Satan">
                        <img src="/images/mr_satan.png" alt="Mr. Satan">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Androide 16">
                        <img src="/images/16.png" alt="Android 16">
                    </button>
                </li>
                <li class="character">
                    <button data-name="17">
                        <img src="/images/17.png" alt="Android 17">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Androide 18">
                        <img src="/images/18.png" alt="Android 18">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Krillin">
                        <img src="/images/kuririn.png" alt="Kuririn">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Dr. Gero">
                        <img src="/images/20.png" alt="Android 20 (Dr. Gero)">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Babidi">
                        <img src="/images/babidi.png" alt="Babidi">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Majin Buu">
                        <img src="/images/majin-Buu.png" alt="Majin Buu">
                    </button>
                </li>
                <li class="character">
                    <button data-name="Raditz">
                        <img src="/images/raditz.png" alt="Raditz">
                    </button>
                </li>

            </ul>
        </section>
        <section class="character-preview">
            <img src="">
        </section>
    </main>
</body>
</html>
